<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丰都县智慧园区综合管理平台</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="admin-body">
    <header class="admin-header">
        <div class="admin-logo">
            <span class="logo-mark">园</span>
            <div>
                <strong>丰都县智慧园区综合管理平台</strong>
                <small>政务业务协同驾驶台</small>
            </div>
        </div>
        <div class="admin-tools">
            <span id="currentTime"></span>
            <button class="tool-btn" data-action="notify">消息 <b>6</b></button>
            <button class="tool-btn" data-action="profile">系统管理员</button>
            <button class="tool-btn ghost" data-action="logout">退出</button>
        </div>
    </header>

    <div class="admin-main">
        <aside class="admin-sidebar" id="adminNav"></aside>
        <main class="admin-content">
            <div class="content-toolbar">
                <div>
                    <div class="breadcrumb" id="breadcrumb">园区综合态势 / 园区概览指标</div>
                    <h1 id="pageTitle">园区概览指标</h1>
                </div>
                <div class="toolbar-actions">
                    <button class="btn btn-default" data-modal="报表导出">导出报表</button>
                    <button class="btn btn-primary" data-modal="数据刷新">刷新数据</button>
                </div>
            </div>
            <section id="pageRoot" class="page-root"></section>
        </main>
    </div>

    <div class="modal-mask hide" id="modalMask">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-head">
                <div>
                    <h3 id="modalTitle">操作确认</h3>
                    <p id="modalSubTitle">当前操作仅用于演示交互流程</p>
                </div>
                <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-foot">
                <button class="btn btn-default" id="modalCancel">取消</button>
                <button class="btn btn-primary" id="modalConfirm">确认办理</button>
            </div>
        </div>
    </div>



    <button class="ai-assistant-launcher" id="aiAssistantLauncher" type="button" aria-label="&#25171;&#24320;AI&#38382;&#31572;&#26234;&#33021;&#20307;">
        <span>AI&#38382;&#31572;&#26234;&#33021;&#20307;</span>
    </button>
    <section class="ai-assistant-panel" id="aiAssistantPanel" aria-label="AI&#38382;&#31572;&#26234;&#33021;&#20307;&#24377;&#31383;">
        <div class="ai-assistant-head">
            <div>
                <strong>AI&#38382;&#31572;&#26234;&#33021;&#20307;</strong>
                <small>&#25919;&#31574;&#21672;&#35810; / &#19994;&#21153;&#22330;&#26223; / &#25307;&#21830;&#38382;&#31572;</small>
            </div>
            <button class="ai-assistant-close" id="aiAssistantClose" type="button" aria-label="&#20851;&#38381;&#38382;&#31572;">&times;</button>
        </div>
        <div class="ai-assistant-body" id="aiAssistantBody">
            <div class="ai-msg robot">
                <div class="ai-msg-bubble">&#24744;&#22909;&#65292;&#36825;&#37324;&#26159; AI &#38382;&#31572;&#26234;&#33021;&#20307;&#65292;&#21487;&#21672;&#35810;&#25307;&#21830;&#25919;&#31574;&#12289;&#20225;&#19994;&#26381;&#21153;&#21644;&#22253;&#21306;&#19994;&#21153;&#22330;&#26223;&#12290;</div>
            </div>
        </div>
        <div class="ai-quick-questions" id="aiQuickQuestions">
            <button type="button" data-question="&#22253;&#21306;&#26377;&#21738;&#20123;&#25307;&#21830;&#25919;&#31574;&#65311;">&#25307;&#21830;&#25919;&#31574;</button>
            <button type="button" data-question="&#26234;&#33021;&#21046;&#36896;&#20135;&#19994;&#36866;&#21512;&#25307;&#24341;&#21738;&#20123;&#20225;&#19994;&#65311;">&#25307;&#21830;&#26041;&#21521;</button>
            <button type="button" data-question="&#20225;&#19994;&#20837;&#39547;&#21518;&#21487;&#20197;&#20139;&#21463;&#21738;&#20123;&#26381;&#21153;&#65311;">&#20225;&#19994;&#26381;&#21153;</button>
            <button type="button" data-question="&#24403;&#21069;&#37325;&#28857;&#19994;&#21153;&#22330;&#26223;&#26377;&#21738;&#20123;&#65311;">&#19994;&#21153;&#22330;&#26223;</button>
        </div>
        <form class="ai-assistant-form" id="aiAssistantForm">
            <input id="aiAssistantInput" type="text" placeholder="&#35831;&#36755;&#20837;&#25919;&#31574;&#12289;&#25307;&#21830;&#12289;&#19994;&#21153;&#30456;&#20851;&#38382;&#39064;">
            <button type="submit">&#21457;&#36865;</button>
        </form>
    </section>

    <script src="./js/echarts.min.js"></script>
    <script src="./js/mock-data.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
